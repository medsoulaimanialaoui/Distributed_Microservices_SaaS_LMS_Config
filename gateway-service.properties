server.port=8080
eureka.client.service-url.defaultZone=${DISCOVERY_SERVICE_URL:http://discovery-service:8761/eureka}

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth-service/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/auth-service/(?<segment>.*), /${segment}

spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=lb://user-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/user-service/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/user-service/(?<segment>.*), /${segment}

spring.cloud.gateway.routes[2].id=email-service
spring.cloud.gateway.routes[2].uri=lb://email-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/email-service/**
spring.cloud.gateway.routes[2].filters[0]=RewritePath=/email-service/(?<segment>.*), /${segment}

spring.cloud.gateway.routes[3].id=course-service
spring.cloud.gateway.routes[3].uri=lb://course-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/course-service/**
spring.cloud.gateway.routes[3].filters[0]=RewritePath=/course-service/(?<segment>.*), /${segment}

spring.cloud.gateway.routes[4].id=content-service
spring.cloud.gateway.routes[4].uri=lb://content-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/content-service/**
spring.cloud.gateway.routes[4].filters[0]=RewritePath=/content-service/(?<segment>.*), /${segment}

spring.cloud.gateway.routes[5].id=quiz-service
spring.cloud.gateway.routes[5].uri=lb://quiz-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/quiz-service/**
spring.cloud.gateway.routes[5].filters[0].filters[0]=RewritePath=/quiz-service/(?<segment>.*), /${segment}

spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://auth-service:8081/api/v1/auth/.well-known/jwks.json
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
management.endpoints.web.exposure.include=*