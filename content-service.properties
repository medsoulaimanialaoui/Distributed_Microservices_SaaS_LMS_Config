# Updated application.properties with improved configuration

server.port=8087

# MinIO Configuration
minio.server.url=http://minio:9000
minio.access-key=admin
minio.secret-key=admin12345
minio.course.video.bucket.name=course-videos

# Upload configuration
spring.servlet.multipart.max-file-size=1GB
spring.servlet.multipart.max-request-size=1GB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2MB

# Logging for troubleshooting
logging.level.com.saas.mohammed=DEBUG
logging.level.io.minio=INFO
